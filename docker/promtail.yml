# =============================================================================
# Promtail — Docker 컨테이너 로그 수집 → Loki 전송
# =============================================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/positions.yaml
clients:
  - url: ${LOKI_URL}
    external_labels:
      host: ${HOSTNAME}
      env: ${ENV}
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_name']
        regex: '.*promtail.*'
        action: drop
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
      - output:
          source: log
      - json:
          expressions:
            level: level
            logger: logger_name
            traceId: traceId
      - labels:
          level: