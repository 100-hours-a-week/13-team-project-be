name: BE V2 수동 배포/롤백
run-name: BE V2 Manual • ${{ inputs.image_tag || 'latest' }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그 (예: sha-abc1234)"
        required: true
      environment:
        description: "배포 환경"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    environment: ${{ inputs.environment == 'prod' && 'production' || 'develop' }}
    env:
      AWS_REGION: ap-northeast-2
      IMAGE_TAG: ${{ inputs.image_tag }}
      COMPOSE_DIR: /home/ubuntu/backend
      DEPLOY_ENV: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync config to S3
        run: aws s3 sync docker/ s3://moyeobab-${{ env.DEPLOY_ENV }}-config/backend/ --delete

      - name: Deploy via SSM Send Command
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Service,Values=backend" "Key=tag:Environment,Values=${{ env.DEPLOY_ENV }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Manual deploy backend ${{ env.IMAGE_TAG }}" \
            --timeout-seconds 300 \
            --max-concurrency "1" \
            --max-errors "0" \
            --parameters commands='[
              "set -e",
              "REGION='"${{ env.AWS_REGION }}"'",
              "IMAGE_TAG='"${{ env.IMAGE_TAG }}"'",
              "COMPOSE_DIR='"${{ env.COMPOSE_DIR }}"'",
              "DEPLOY_ENV='"${{ env.DEPLOY_ENV }}"'",
              "",
              "# S3에서 배포 설정 파일 동기화",
              "mkdir -p ${COMPOSE_DIR}",
              "aws s3 sync s3://moyeobab-${DEPLOY_ENV}-config/backend/ ${COMPOSE_DIR}/ --exclude '.env' --region ${REGION}",
              "",
              "# ECR login",
              "ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${REGION}.amazonaws.com",
              "aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "",
              "# .env 생성 (Docker Compose용 — 앱 설정은 Spring Cloud AWS가 Parameter Store에서 직접 로드)",
              "> ${COMPOSE_DIR}/.env",
              "echo \"ECR_REGISTRY=${ECR_REGISTRY}\" >> ${COMPOSE_DIR}/.env",
              "echo \"IMAGE_TAG=${IMAGE_TAG}\" >> ${COMPOSE_DIR}/.env",
              "echo \"SPRING_PROFILES_ACTIVE=${DEPLOY_ENV}\" >> ${COMPOSE_DIR}/.env",
              "",
              "# Deploy",
              "cd ${COMPOSE_DIR} && docker compose pull && docker compose up -d",
              "",
              "# Health check",
              "sleep 15",
              "curl -sf --retry 10 --retry-delay 5 http://localhost:8080/actuator/health",
              "echo \"Health check passed\"",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Command ID: $COMMAND_ID"

      - name: Wait for deployment result
        id: wait-result
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command_id }}"

          sleep 5
          INSTANCE_IDS=$(aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --query "CommandInvocations[*].InstanceId" \
            --output text)

          ALL_SUCCESS=true
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for $INSTANCE_ID..."
            for i in $(seq 1 60); do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" --output text 2>/dev/null || echo "Pending")

              if [ "$STATUS" = "Success" ]; then
                echo "$INSTANCE_ID: Success"
                break
              elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
                echo "$INSTANCE_ID: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text || true
                ALL_SUCCESS=false
                break
              fi
              sleep 5
            done
          done

          if [ "$ALL_SUCCESS" = "true" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="BE V2 수동 배포 성공"
            COLOR=3066993
          else
            TITLE="BE V2 수동 배포 실패"
            COLOR=15158332
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg color "$COLOR" \
            --arg tag "${{ env.IMAGE_TAG }}" \
            --arg url "$RUN_URL" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                fields: [
                  {name: "이미지 태그", value: ("`" + $tag + "`"), inline: true},
                  {name: "상세", value: ("[Actions 로그](" + $url + ")"), inline: false}
                ],
                footer: {text: "BE V2 Manual Deploy"}
              }]
            }' | curl -sf -X POST "$WEBHOOK" -H "Content-Type: application/json" -d @-
