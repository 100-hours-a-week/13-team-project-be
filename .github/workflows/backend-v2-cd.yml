name: BE V2 CD Pipeline
run-name: BE V2 CD • sha-${{ github.event.workflow_run.head_sha }}

on:
  workflow_run:
    workflows: ["BE V2 CI Pipeline"]
    types: [completed]

permissions:
  id-token: write
  actions: read

concurrency:
  group: be-v2-cd-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-24.04-arm
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'develop' }}
    env:
      AWS_REGION: ap-northeast-2
      IMAGE_TAG: sha-${{ github.event.workflow_run.head_sha }}
      COMPOSE_DIR: /home/ubuntu/backend
      DEPLOY_ENV: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync config to S3
        run: aws s3 sync docker/ s3://moyeobab-${{ env.DEPLOY_ENV }}-config/backend/ --delete

      - name: Deploy via SSM Send Command
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Service,Values=backend" "Key=tag:Environment,Values=${{ env.DEPLOY_ENV }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend ${{ env.IMAGE_TAG }}" \
            --timeout-seconds 300 \
            --max-concurrency "1" \
            --max-errors "0" \
            --parameters commands='[
              "set -eu",
              "REGION='"${{ env.AWS_REGION }}"'",
              "IMAGE_TAG='"${{ env.IMAGE_TAG }}"'",
              "COMPOSE_DIR='"${{ env.COMPOSE_DIR }}"'",
              "DEPLOY_ENV='"${{ env.DEPLOY_ENV }}"'",
              "",
              "# S3에서 배포 설정 파일 동기화 (docker-compose, promtail)",
              "mkdir -p ${COMPOSE_DIR}",
              "aws s3 sync s3://moyeobab-${DEPLOY_ENV}-config/backend/ ${COMPOSE_DIR}/ --exclude '.env' --region ${REGION}",
              "",
              "# 현재 이미지 태그 백업 (롤백용)",
              "PREV_IMAGE=$(docker inspect --format={{.Config.Image}} $(docker compose -f ${COMPOSE_DIR}/docker-compose.yml ps -q app) 2>/dev/null || echo \"\")",
              "echo \"[INFO] Current image: ${PREV_IMAGE}\"",
              "echo \"[INFO] Target image tag: ${IMAGE_TAG}\"",
              "",
              "# ECR login",
              "ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${REGION}.amazonaws.com",
              "aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "EXPECTED_IMAGE=${ECR_REGISTRY}/moyeobab/${DEPLOY_ENV}/backend:${IMAGE_TAG}",
              "echo \"[INFO] Expected image: ${EXPECTED_IMAGE}\"",
              "",
              "# .env 생성 (Docker Compose용 — 앱 설정은 Spring Cloud AWS가 Parameter Store에서 직접 로드)",
              "> ${COMPOSE_DIR}/.env",
              "echo \"ECR_REGISTRY=${ECR_REGISTRY}\" >> ${COMPOSE_DIR}/.env",
              "echo \"IMAGE_TAG=${IMAGE_TAG}\" >> ${COMPOSE_DIR}/.env",
              "echo \"ENV=${DEPLOY_ENV}\" >> ${COMPOSE_DIR}/.env",
              "echo \"SPRING_PROFILES_ACTIVE=${DEPLOY_ENV}\" >> ${COMPOSE_DIR}/.env",
              "LOKI_VAL=$(aws ssm get-parameter --name /moyeobab/spring/${DEPLOY_ENV}/LOKI_URL --query Parameter.Value --output text --region ${REGION})",
              "echo \"LOKI_URL=\${LOKI_VAL}\" >> ${COMPOSE_DIR}/.env",
              "",
              "# Deploy (app 서비스만 명시적으로 pull + recreate)",
              "cd ${COMPOSE_DIR}",
              "docker compose pull -q app",
              "docker compose up -d app",
              "",
              "# 이미지 태그 검증",
              "sleep 3",
              "RUNNING_IMAGE=$(docker inspect --format={{.Config.Image}} $(docker compose ps -q app) 2>/dev/null || echo \"\")",
              "echo \"[INFO] Running image: ${RUNNING_IMAGE}\"",
              "if [ \"${RUNNING_IMAGE}\" != \"${EXPECTED_IMAGE}\" ]; then",
              "  echo \"[FAIL] Image mismatch! Expected: ${EXPECTED_IMAGE}, Running: ${RUNNING_IMAGE}\"",
              "  if [ -n \"${PREV_IMAGE}\" ]; then",
              "    echo \"[ROLLBACK] Reverting to ${PREV_IMAGE}\"",
              "    PREV_TAG=${PREV_IMAGE##*:}",
              "    sed -i \"s/IMAGE_TAG=.*/IMAGE_TAG=${PREV_TAG}/\" ${COMPOSE_DIR}/.env",
              "    docker compose up -d app",
              "    sleep 20",
              "    curl -sf --retry 10 --retry-delay 5 --retry-all-errors http://localhost:8080/actuator/health && echo \"[ROLLBACK] Health check passed\" || echo \"[ROLLBACK] Health check also failed\"",
              "  fi",
              "  exit 1",
              "fi",
              "",
              "# Health check (Spring Boot start_period 고려하여 대기)",
              "echo \"[INFO] Image verified, starting health check...\"",
              "sleep 30",
              "if curl -sf --retry 20 --retry-delay 5 --retry-all-errors http://localhost:8080/actuator/health; then",
              "  echo \"[SUCCESS] Deploy complete: ${EXPECTED_IMAGE}\"",
              "  docker image prune -f",
              "  exit 0",
              "fi",
              "",
              "# Rollback on health check failure",
              "echo \"[FAIL] Health check failed\"",
              "echo \"[DEBUG] Container status before rollback:\"",
              "docker compose ps || true",
              "echo \"[DEBUG] backend-app-1 logs (tail 300):\"",
              "docker logs backend-app-1 --tail 300 || docker compose logs --tail 300 app || true",
              "if [ -n \"${PREV_IMAGE}\" ]; then",
              "  echo \"[ROLLBACK] Reverting to ${PREV_IMAGE}\"",
              "  PREV_TAG=${PREV_IMAGE##*:}",
              "  sed -i \"s/IMAGE_TAG=.*/IMAGE_TAG=${PREV_TAG}/\" ${COMPOSE_DIR}/.env",
              "  docker compose up -d app",
              "  sleep 20",
              "  curl -sf --retry 10 --retry-delay 5 --retry-all-errors http://localhost:8080/actuator/health && echo \"[ROLLBACK] Succeeded\" || echo \"[ROLLBACK] Also failed\"",
              "fi",
              "exit 1"
            ]' \
            --query "Command.CommandId" --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Command ID: $COMMAND_ID"

      - name: Wait for deployment result
        id: wait-result
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command_id }}"
          echo "Command ID: $COMMAND_ID"

          # SSM 타겟 인스턴스 ID 조회 (최대 30초 대기)
          INSTANCE_IDS=""
          for attempt in $(seq 1 6); do
            sleep 5
            INSTANCE_IDS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --query "CommandInvocations[*].InstanceId" \
              --output text)
            if [ -n "$INSTANCE_IDS" ]; then
              break
            fi
            echo "Waiting for SSM targets... (attempt $attempt/6)"
          done

          # 타겟 인스턴스 0대 체크
          if [ -z "$INSTANCE_IDS" ]; then
            echo "::error::SSM 타겟 인스턴스가 없습니다. tag:Service=backend, tag:Environment=${{ env.DEPLOY_ENV }} 에 매칭되는 인스턴스를 확인하세요."
            echo "result=no-targets" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          INSTANCE_COUNT=$(echo "$INSTANCE_IDS" | wc -w | tr -d ' ')
          echo "Target instances ($INSTANCE_COUNT): $INSTANCE_IDS"

          ALL_SUCCESS=true
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "--- Waiting for $INSTANCE_ID ---"
            for i in $(seq 1 60); do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" --output text 2>/dev/null || echo "Pending")

              if [ "$STATUS" = "Success" ]; then
                echo "$INSTANCE_ID: Success"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text 2>/dev/null | tail -5 || true
                break
              elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
                echo "::error::$INSTANCE_ID: $STATUS"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text 2>/dev/null | tail -300 || true
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text 2>/dev/null | tail -200 || true
                ALL_SUCCESS=false
                break
              fi
              sleep 5
            done
          done

          if [ "$ALL_SUCCESS" = "true" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Save IMAGE_TAG to Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/moyeobab/spring/${{ env.DEPLOY_ENV }}/IMAGE_TAG" \
            --value "${{ env.IMAGE_TAG }}" \
            --type String \
            --overwrite

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CD }}
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          AUTHOR: ${{ github.event.workflow_run.head_commit.author.name }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ENV_UPPER=$(echo "$DEPLOY_ENV" | tr '[:lower:]' '[:upper:]')
          RESULT="${{ steps.wait-result.outputs.result }}"

          if [ "${{ job.status }}" = "success" ]; then
            TITLE="[${ENV_UPPER}] Backend 배포 성공"
            DESC="EC2에 \`${{ env.IMAGE_TAG }}\` 배포 완료"
            COLOR=3066993
          else
            TITLE="[${ENV_UPPER}] Backend 배포 실패"
            if [ "$RESULT" = "no-targets" ]; then
              DESC="SSM 타겟 인스턴스가 없습니다 (tag:Service=backend, tag:Environment=${DEPLOY_ENV})"
            elif [ "$RESULT" = "failure" ]; then
              DESC="EC2 배포 스크립트 실패 — 이전 버전으로 롤백 시도됨. Actions 로그에서 롤백 결과를 확인하세요"
            else
              DESC="배포 실패 — Actions 로그를 확인하세요"
            fi
            COLOR=15158332
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg color "$COLOR" \
            --arg env_label "$ENV_UPPER" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg msg "$COMMIT_MSG" \
            --arg tag "${{ env.IMAGE_TAG }}" \
            --arg url "$RUN_URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: ($color | tonumber),
                fields: [
                  {name: "환경", value: $env_label, inline: true},
                  {name: "브랜치", value: $branch, inline: true},
                  {name: "작성자", value: $author, inline: true},
                  {name: "이미지 태그", value: ("`" + $tag + "`"), inline: true},
                  {name: "커밋", value: $msg, inline: false},
                  {name: "상세", value: ("[Actions 로그](" + $url + ")"), inline: false}
                ],
                footer: {
                  text: "Backend CD"
                }
              }]
            }' | curl -sf -X POST "$WEBHOOK" -H "Content-Type: application/json" -d @-
