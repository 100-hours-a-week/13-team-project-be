spring:
  application:
    name: matchimban-api

  profiles:
    active: local

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}

  # cloud:
  #   aws:
  #     region:
  #       static: ${AWS_REGION:ap-northeast-2}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}

  # cloud:
  #   aws:
  #     region:
  #       static: ${AWS_REGION}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

resilience4j:
  circuitbreaker:
    instances:
      kakao:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  bulkhead:
    instances:
      kakao:
        max-concurrent-calls: 20
        max-wait-duration: 0

ai-recommendation:
  timeout-ms: 50000

rag-chat:
  base-url: ${RAG_CHAT_BASE_URL:http://localhost:8001}
  timeout-ms: ${RAG_CHAT_TIMEOUT_MS:10000}
  connect-timeout-ms: ${RAG_CHAT_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${RAG_CHAT_READ_TIMEOUT_MS:10000}
  paths:
    ask: ${RAG_CHAT_PATH_ASK:/RAGchat}
    reset: ${RAG_CHAT_PATH_RESET:/RAGchat/{user_id}}
    history: ${RAG_CHAT_PATH_HISTORY:/history/{user_id}}
    health: ${RAG_CHAT_PATH_HEALTH:/health}

perf-log:
  enabled: ${PERF_LOG_ENABLED:true}
  slow-request-ms: ${PERF_LOG_SLOW_REQUEST_MS:500}
  slow-query-ms: ${PERF_LOG_SLOW_QUERY_MS:200}
  log-sql-text: ${PERF_LOG_SQL_TEXT:true}
  log-all-sql: ${PERF_LOG_ALL_SQL:false}
  max-sql-length: ${PERF_LOG_MAX_SQL_LENGTH:500}
  exclude-path-prefixes:
    - /actuator
    - /swagger-ui
    - /v3/api-docs

chat:
  upload:
    bucket: ${CHAT_IMAGE_BUCKET:}
    public-base-url: ${CHAT_IMAGE_PUBLIC_BASE_URL:}
    presign-expires-seconds: ${CHAT_IMAGE_PRESIGN_EXPIRES_SECONDS:120}
    max-file-size-bytes: ${CHAT_IMAGE_MAX_FILE_SIZE_BYTES:10485760}
    allowed-content-types: ${CHAT_IMAGE_ALLOWED_CONTENT_TYPES:image/jpeg,image/jpg,image/png,image/webp,image/gif}
  unread:
    window-size: ${CHAT_UNREAD_WINDOW_SIZE:150}
    refresh:
      coalescing-enabled: ${CHAT_UNREAD_REFRESH_COALESCING_ENABLED:true}
      debounce-millis: ${CHAT_UNREAD_REFRESH_DEBOUNCE_MILLIS:120}
      coalescing-threads: ${CHAT_UNREAD_REFRESH_COALESCING_THREADS:4}
  cache:
    messages:
      recent:
        enabled: ${CHAT_CACHE_MESSAGES_RECENT_ENABLED:true}
        window-size: ${CHAT_CACHE_MESSAGES_RECENT_WINDOW_SIZE:100}
        ttl-seconds: ${CHAT_CACHE_MESSAGES_RECENT_TTL_SECONDS:120}
        hot-ttl-seconds: ${CHAT_CACHE_MESSAGES_RECENT_HOT_TTL_SECONDS:30}
        cold-ttl-seconds: ${CHAT_CACHE_MESSAGES_RECENT_COLD_TTL_SECONDS:180}
        only-hot-rooms: ${CHAT_CACHE_MESSAGES_RECENT_ONLY_HOT_ROOMS:false}
        hot-threshold-per-window: ${CHAT_CACHE_MESSAGES_RECENT_HOT_THRESHOLD_PER_WINDOW:120}
        traffic-window-seconds: ${CHAT_CACHE_MESSAGES_RECENT_TRAFFIC_WINDOW_SECONDS:60}
        lock-enabled: ${CHAT_CACHE_MESSAGES_RECENT_LOCK_ENABLED:true}
        lock-ttl-millis: ${CHAT_CACHE_MESSAGES_RECENT_LOCK_TTL_MILLIS:2000}
        lock-retry-count: ${CHAT_CACHE_MESSAGES_RECENT_LOCK_RETRY_COUNT:15}
        lock-retry-backoff-millis: ${CHAT_CACHE_MESSAGES_RECENT_LOCK_RETRY_BACKOFF_MILLIS:5}
      latest-id:
        ttl-seconds: ${CHAT_CACHE_MESSAGES_LATEST_ID_TTL_SECONDS:120}
  redis:
    channel:
      message-created: ${CHAT_REDIS_CHANNEL_MESSAGE_CREATED:chat:meeting:message-created}
      unread-counts-updated: ${CHAT_REDIS_CHANNEL_UNREAD_COUNTS_UPDATED:chat:meeting:unread-counts-updated}

notification:
  dispatch:
    enabled: ${NOTIFICATION_DISPATCH_ENABLED:true}
    poll-delay: ${NOTIFICATION_DISPATCH_POLL_DELAY:2000ms}
    batch-size: ${NOTIFICATION_DISPATCH_BATCH_SIZE:20}
    stale-lock-threshold: ${NOTIFICATION_DISPATCH_STALE_LOCK_THRESHOLD:2m}
  schedule:
    enabled: ${NOTIFICATION_SCHEDULE_ENABLED:true}
    poll-delay: ${NOTIFICATION_SCHEDULE_POLL_DELAY:2000ms}
    batch-size: ${NOTIFICATION_SCHEDULE_BATCH_SIZE:20}
    stale-lock-threshold: ${NOTIFICATION_SCHEDULE_STALE_LOCK_THRESHOLD:2m}
  retry:
    max-attempts: ${NOTIFICATION_MAX_ATTEMPTS:6}
  retention:
    cleanup-cron: ${NOTIFICATION_RETENTION_CLEANUP_CRON:0 20 4 * * *}
    enabled: ${NOTIFICATION_RETENTION_ENABLED:true}
    notification-deleted-retention: ${NOTIFICATION_DELETED_RETENTION:30d}
    notification-created-retention: ${NOTIFICATION_CREATED_RETENTION:180d}
    outbox-retention: ${NOTIFICATION_OUTBOX_RETENTION:14d}
    schedule-retention: ${NOTIFICATION_SCHEDULE_RETENTION:14d}
    inactive-token-retention: ${NOTIFICATION_INACTIVE_TOKEN_RETENTION:90d}
  firebase:
    enabled: ${NOTIFICATION_FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:moyeobab}
    service-account-json-base64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:}
    service-account-file: ${FIREBASE_SERVICE_ACCOUNT_FILE:}

app:
  cdn:
    base-url: ${APP_CDN_BASE_URL:}

  s3:
    bucket: ${APP_S3_BUCKET}
    receipt-prefix: ${APP_S3_RECEIPT_PREFIX}
    presign-upload-ttl: 10m

  ocr:
    base-url: ${RUNPOD_OCR_BASE_URL}
    timeout: 120s
    health-timeout: 3s
    lease: 150s
    poll-delay: 1000ms
    initial-retry-delay: 10s
    max-retry-delay: 60s
    max-attempts: 3


