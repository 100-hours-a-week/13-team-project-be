spring:
  application:
    name: matchimban-api

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

flyway:
    enabled: ${FLYWAY_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

resilience4j:
  circuitbreaker:
    instances:
      kakao:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  bulkhead:
    instances:
      kakao:
        max-concurrent-calls: 20
        max-wait-duration: 0

ai-recommendation:
  timeout-ms: 5000

perf-log:
  enabled: ${PERF_LOG_ENABLED:true}
  slow-request-ms: ${PERF_LOG_SLOW_REQUEST_MS:500}
  slow-query-ms: ${PERF_LOG_SLOW_QUERY_MS:200}
  exclude-path-prefixes:
    - /actuator
    - /swagger-ui
    - /v3/api-docs

chat:
  unread:
    window-size: ${CHAT_UNREAD_WINDOW_SIZE:150}
  redis:
    channel:
      message-created: ${CHAT_REDIS_CHANNEL_MESSAGE_CREATED:chat:meeting:message-created}
      unread-counts-updated: ${CHAT_REDIS_CHANNEL_UNREAD_COUNTS_UPDATED:chat:meeting:unread-counts-updated}

